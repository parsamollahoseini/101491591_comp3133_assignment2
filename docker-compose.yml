services:
  backend:
    build:
      context: ./backend
    container_name: comp3133-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: comp3133-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:4200"
